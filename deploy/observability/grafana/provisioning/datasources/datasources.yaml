# Auto-provisioned Grafana datasources for the pdlcflow observability stack.
apiVersion: 1
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      # Let trace views link back to Prometheus metrics.
      tracesToMetrics:
        datasourceUid: prometheus
