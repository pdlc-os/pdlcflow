name: pdlcflow

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pdlc
      POSTGRES_DB: pdlc
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../../
      dockerfile: services/pdlc-engine/Dockerfile
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports: ["8000:8000"]

  worker:
    build:
      context: ../../
      dockerfile: services/pdlc-engine/Dockerfile
    command: ["uv", "run", "arq", "app.worker.arq_settings.WorkerSettings"]
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  studio:
    build:
      context: ../../apps/studio
      dockerfile: Dockerfile
    depends_on: [api]
    ports: ["8080:80"]

  caddy:
    image: caddy:2-alpine
    profiles: [tls]
    depends_on: [studio]
    ports: ["80:80", "443:443"]
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config

volumes:
  pgdata:
  caddy-data:
  caddy-config:
