name: pdlcflow

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pdlc
      POSTGRES_DB: pdlc
      PDLC_APP_DB_PASSWORD: ${PDLC_APP_DB_PASSWORD:-pdlc_app}  # used by postgres-init/01-app-role.sh
    ports: ["5432:5432"]
    volumes:
      - "pgdata:/var/lib/postgresql/data"
      # Creates the non-owner `pdlc_app` role on first init (Phase 3 RLS).
      - "./postgres-init:/docker-entrypoint-initdb.d:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible object store for the artifact store (PDLC_ARTIFACT_STORE=s3,
  # PDLC_S3_ENDPOINT_URL=http://minio:9000). Self-host default uses filesystem.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../../
      dockerfile: services/pdlc-engine/Dockerfile
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports: ["8000:8000"]
    volumes: ["artifacts:/var/lib/pdlcflow/artifacts"]

  worker:
    build:
      context: ../../
      dockerfile: services/pdlc-engine/Dockerfile
    command: ["uv", "run", "arq", "app.worker.arq_settings.WorkerSettings"]
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes: ["artifacts:/var/lib/pdlcflow/artifacts"]

  studio:
    build:
      # Repo-root context so the pnpm workspace lockfile is available.
      context: ../../
      dockerfile: apps/studio/Dockerfile
    depends_on: [api]
    ports: ["8080:80"]

  # One-shot: score the eval golden suite with the REAL judge (needs PDLC_WIRE_LLM
  # + provider creds in .env). Run with:  docker compose --profile evals run --rm evals
  evals:
    profiles: ["evals"]
    build:
      context: ../../
      dockerfile: services/pdlc-engine/Dockerfile
    env_file: .env
    environment:
      PDLC_RUN_EVALS: "1"
      PDLC_WIRE_LLM: "true"
    # Standalone — scores the golden suite via the judge; no DB/Redis needed.
    working_dir: /workspace/services/pdlc-engine
    command: ["uv", "run", "python", "/workspace/scripts/run_eval_suite.py", "--real"]

  # ── Observability stack (opt-in) ─────────────────────────────────────────
  # Enable with:  set PDLC_OTEL_ENABLED=true in .env, then
  #   docker compose --profile observability up -d
  # The engine exports OTLP → otel-collector, which fans traces to Tempo and
  # metrics to Prometheus; Grafana (:3000) and the Streamlit Nexus dashboard
  # (:8501) read from them. See docs/wiki/19-observability.md.
  otel-collector:
    profiles: ["observability"]
    image: otel/opentelemetry-collector-contrib:0.111.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports: ["4317:4317", "4318:4318", "8889:8889"]

  tempo:
    profiles: ["observability"]
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempodata:/var/tempo

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.54.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports: ["9090:9090"]

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.2.2
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports: ["3000:3000"]
    depends_on: [prometheus, tempo]

  nexus-dashboard:
    profiles: ["observability"]
    build:
      context: ../../
      dockerfile: services/nexus-dashboard/Dockerfile
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      TEMPO_URL: http://tempo:3200
      GRAFANA_URL: http://localhost:3000
    ports: ["8501:8501"]
    depends_on: [prometheus, tempo]

  caddy:
    image: caddy:2-alpine
    profiles: [tls]
    depends_on: [studio]
    ports: ["80:80", "443:443"]
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config

volumes:
  pgdata:
  miniodata:
  artifacts:
  caddy-data:
  caddy-config:
  tempodata:
  promdata:
  grafanadata:
