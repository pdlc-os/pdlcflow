# Grafana Tempo — single-binary trace store (local filesystem). Fine for a
# self-host / single-node pdlcflow; swap `storage.trace.backend` for s3/gcs at scale.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 48h   # keep traces 2 days; raise for longer retention

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
