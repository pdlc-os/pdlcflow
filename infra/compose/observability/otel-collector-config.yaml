# OpenTelemetry Collector — receives OTLP from pdlc-engine, fans out:
#   traces  → Tempo (otlp/grpc)
#   metrics → Prometheus (scraped from this collector's :8889 /metrics endpoint)
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889
    # Turn OTel resource attributes (service.name, deployment.environment) into
    # metric labels so the dashboards can slice by service/env.
    resource_to_telemetry_conversion:
      enabled: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
