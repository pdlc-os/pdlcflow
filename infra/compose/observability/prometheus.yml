# Prometheus — scrapes the OTel collector's Prometheus exporter, where all
# pdlc.* metrics (turns, llm calls/tokens/cost, gates) land.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
