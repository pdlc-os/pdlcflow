[project]
name = "pdlc-event-schema"
version = "0.0.1"
description = "Pydantic envelope + 35 typed payloads for the PDLC clickstream"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
    "pydantic>=2.7,<3",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.6", "mypy>=1.10"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["event_schema"]
