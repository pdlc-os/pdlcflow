[project]
name = "pdlc-graph"
version = "1.13.0"
description = "LangGraph engine for PDLC: meta-graph, phase subgraphs, party meetings, personas, Sentinel evaluator"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
    "langgraph>=0.2,<0.3",
    "langchain-core>=0.3",
    "pdlc-event-schema",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.6", "mypy>=1.10"]

[tool.pytest.ini_options]
markers = [
    "eval: pdlcflow eval-harness tests (hermetic, deterministic stub judge)",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pdlc_graph"]

[tool.hatch.build.targets.wheel.force-include]
"pdlc_graph/personas" = "pdlc_graph/personas"
"pdlc_graph/evals/golden" = "pdlc_graph/evals/golden"
