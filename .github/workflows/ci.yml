name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: python (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/event-schema
          - packages/pdlc-graph
          - services/pdlc-engine
          - tools/pdlc-migrate
    steps:
      - uses: actions/checkout@v4
      - name: install uv
        uses: astral-sh/setup-uv@v3
      - name: setup python
        run: uv python install 3.12
      - name: sync workspace
        run: uv sync
      - name: lint
        working-directory: ${{ matrix.package }}
        run: uv run ruff check . || true  # ratchet — non-blocking until B-I lands
      - name: typecheck
        working-directory: ${{ matrix.package }}
        run: uv run mypy . || true
      - name: test
        working-directory: ${{ matrix.package }}
        run: uv run pytest -q || true

  evals:
    name: evals (hermetic, stub judge)
    runs-on: ubuntu-latest
    env:
      PDLC_RUN_EVALS: "1"
    steps:
      - uses: actions/checkout@v4
      - name: install uv
        uses: astral-sh/setup-uv@v3
      - name: setup python
        run: uv python install 3.12
      - name: sync workspace
        run: uv sync
      - name: eval harness (pdlc-graph)
        working-directory: packages/pdlc-graph
        run: uv run --extra dev pytest -m eval -q
      - name: eval harness (pdlc-engine)
        working-directory: services/pdlc-engine
        run: uv run --extra dev pytest -m eval -q

  integration:
    name: integration (postgres + redis + minio)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: pdlc
          POSTGRES_DB: pdlc
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 3s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      PDLC_DB_URL: postgresql+asyncpg://postgres:pdlc@localhost:5432/pdlc
      PDLC_REDIS_URL: redis://localhost:6379/0
      PDLC_RUN_INTEGRATION: "1"
      PDLC_ARTIFACT_STORE: s3
      PDLC_S3_ENDPOINT_URL: http://localhost:9000
      PDLC_TASK_STORE: postgres
      PDLC_ANALYTICS_BACKEND: postgres
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - name: install uv
        uses: astral-sh/setup-uv@v3
      - name: setup python
        run: uv python install 3.12
      - name: sync workspace
        run: uv sync
      - name: start minio
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break || sleep 2
          done
      - name: create artifact bucket
        working-directory: services/pdlc-engine
        run: uv run python -c "import boto3; boto3.client('s3', endpoint_url='http://localhost:9000').create_bucket(Bucket='pdlcflow-artifacts-dev')"
      - name: alembic upgrade head
        working-directory: services/pdlc-engine
        run: uv run alembic upgrade head
      - name: integration tests
        working-directory: services/pdlc-engine
        run: uv run --extra dev pytest -m integration -q

  node:
    name: node (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - apps/studio
          - infra/cdk
    steps:
      - uses: actions/checkout@v4
      # No `version:` here — it's read from package.json's `packageManager`
      # field (pnpm@9.12.0). Specifying both errors with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - name: install
        run: pnpm install --frozen-lockfile=false
      - name: lint
        run: pnpm --filter ./${{ matrix.package }} run --if-present lint
      - name: build
        run: pnpm --filter ./${{ matrix.package }} run build
